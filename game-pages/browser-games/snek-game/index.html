<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport", content="width=device-width, initial-scale=1.0">
    <title>
    Snek Game
  </title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
    <div class="gameboy-body">
            
        <div class="border1">
         <div class="border2">
              <div class="border3">
                <canvas id="gameBoard"></canvas>
                <div id = board></div>
                <div id="scoreBoard">Score: <span id="score">0</span></div>
                <img src="Thumbnailforgame.png" alt="A thumbnail i made for this game" id="game-logo">
                <h1 id="instructional-text">Press WASD to Begin</h1>
                </div>
            </div>
        </div>

        <div class="controls-area">
            <div class="dpad">
                <div class="dpad-horizontal"></div>
                <div class="dpad-vertical"></div>
            </div>

            <div class="action-buttons">
                <div class="button b-button">B</div>
                <div class="button a-button">A</div>
            </div>
        </div>

    </div>
</body>
</html>
